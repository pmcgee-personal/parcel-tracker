# .github/workflows/deploy.yml
name: Deploy Parcel Tracker

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2 # Make sure this is your correct AWS region

      - name: Setup SAM
        uses: aws-actions/setup-sam@v2

      - name: SAM Build
        run: sam build --use-container

      - name: SAM Deploy
        # MODIFIED LINE: Added --parameter-overrides to inject the NTFY_URL secret securely
        run: >
          sam deploy 
          --no-confirm-changeset 
          --stack-name parcel-tracker-stack 
          --no-fail-on-empty-changeset 
          --parameter-overrides NtfyUrl="${{ secrets.NTFY_URL }}"

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22" # Match the Lambda runtime (nodejs22.x)

      - name: Build and Deploy Frontend
        working-directory: ./frontend
        run: |
          # 1. Fetch the dynamic URLs/IDs from the deployed SAM stack
          API_URL=$(aws cloudformation describe-stacks --stack-name parcel-tracker-stack --query "Stacks[0].Outputs[?OutputKey=='ListApiUrl'].OutputValue" --output text)
          BUCKET_NAME=$(aws cloudformation describe-stacks --stack-name parcel-tracker-stack --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" --output text)
          DIST_ID=$(aws cloudformation describe-stacks --stack-name parcel-tracker-stack --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" --output text)

          # Fetch the generated API key value required by the /track endpoints.
          # The output gives the key ID; --include-value resolves it to the secret.
          API_KEY_ID=$(aws cloudformation describe-stacks --stack-name parcel-tracker-stack --query "Stacks[0].Outputs[?OutputKey=='ApiKeyId'].OutputValue" --output text)
          API_KEY=$(aws apigateway get-api-key --api-key "$API_KEY_ID" --include-value --query value --output text)

          # 2. Install dependencies and build React (passing the API URL + key dynamically)
          npm ci
          VITE_API_BASE_URL=$API_URL VITE_API_KEY=$API_KEY npm run build

          # 3. Sync the built website to S3 and invalidate the CloudFront cache
          aws s3 sync dist/ s3://$BUCKET_NAME --delete
          aws cloudfront create-invalidation --distribution-id $DIST_ID --paths "/*"
