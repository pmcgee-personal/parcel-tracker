AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  parcel-tracker
  A personal package tracking dashboard for inbound and outbound shipments.

# -----------------------------------------------------------------------------
# PARAMETERS
# -----------------------------------------------------------------------------
Parameters:
  NtfyUrl:
    Type: String
    Description: "The unique ntfy.sh channel URL used for sending push notifications"
    NoEcho: true # Hides the value in CloudFormation logs and the AWS Console

Globals:
  Function:
    Timeout: 20 # 20 seconds to allow time for external API calls and database operations
    Runtime: nodejs22.x
  Api:
    Cors:
      AllowMethods: "'GET,POST,OPTIONS'"
      AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
      AllowOrigin: "'*'"

Resources:
  # DynamoDB table to store high-level shipment details.
  # PK = trackingNumber
  ShipmentsTable:
    Type: AWS::Serverless::SimpleTable
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: Shipments
      PrimaryKey:
        Name: trackingNumber
        Type: String
      ProvisionedThroughput:
        ReadCapacityUnits: 1
        WriteCapacityUnits: 1
      SSESpecification:
        SSEEnabled: true

  # DynamoDB table to store the timeline of tracking events for each shipment.
  # PK = trackingNumber, SK = occurredAt
  EventsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: Events
      AttributeDefinitions:
        - AttributeName: trackingNumber
          AttributeType: S
        - AttributeName: occurredAt
          AttributeType: S
      KeySchema:
        - AttributeName: trackingNumber
          KeyType: HASH
        - AttributeName: occurredAt
          KeyType: RANGE
      ProvisionedThroughput:
        ReadCapacityUnits: 1
        WriteCapacityUnits: 1
      SSESpecification:
        SSEEnabled: true

  # Lambda function to ingest webhook tracking updates from carrier integrations
  WebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers/webhook/index.handler
      Environment:
        Variables:
          SHIPMENTS_TABLE: !Ref ShipmentsTable
          EVENTS_TABLE: !Ref EventsTable
          NTFY_URL: !Ref NtfyUrl # <--- INJECTING PARAMETER HERE SECURELY
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ShipmentsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref EventsTable
      Events:
        WebhookApi:
          Type: Api
          Properties:
            Path: /webhook
            Method: post

  # Lambda function to register a new tracking number and fetch initial status
  TrackFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers/track/index.handler
      Environment:
        Variables:
          SHIPMENTS_TABLE: !Ref ShipmentsTable
          EVENTS_TABLE: !Ref EventsTable
          # Point the Lambda to the exact secret hierarchy we created
          SECRET_NAME: "ParcelTracker/ShipStationApiKey"
      Policies:
        # Permission to write to both DynamoDB tables
        - DynamoDBCrudPolicy:
            TableName: !Ref ShipmentsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref EventsTable
        # Official AWS SAM policy template name to read a secret
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:ParcelTracker/ShipStationApiKey-*"
      Events:
        TrackApi:
          Type: Api
          Properties:
            Path: /track
            Method: post

  # Lambda function to retrieve all tracked shipments for the frontend
  ListFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers/list/index.handler
      Environment:
        Variables:
          SHIPMENTS_TABLE: !Ref ShipmentsTable
          # --- NEW: Added Events Table Environment Variable ---
          EVENTS_TABLE: !Ref EventsTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ShipmentsTable
        # --- NEW: Added Read Permissions for the Events Table ---
        - DynamoDBReadPolicy:
            TableName: !Ref EventsTable
      Events:
        ListApi:
          Type: Api
          Properties:
            Path: /track
            Method: get

  # --- FRONTEND HOSTING RESOURCES ---
  FrontendBucket:
    Type: AWS::S3::Bucket
    Metadata:
      # Suppress cfn-guard rules that interfere with public static website hosting
      guard:
        SuppressedRules:
          - S3_BUCKET_LEVEL_PUBLIC_ACCESS_PROHIBITED
          - S3_BUCKET_PUBLIC_READ_PROHIBITED
          - S3_BUCKET_PUBLIC_WRITE_PROHIBITED
          - S3_BUCKET_SSL_REQUESTS_ONLY
          - S3_BUCKET_LOGGING_ENABLED
    Properties:
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      # Fix Error 5: Enable Bucket Versioning
      VersioningConfiguration:
        Status: Enabled
      # Fix Error 4: Enable default Server-Side Encryption
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

    FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Metadata:
      # Suppress cfn-guard picky regex matching at the policy level so VS Code stays green
      guard:
        SuppressedRules:
          - S3_BUCKET_SSL_REQUESTS_ONLY
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          # Statement 1: Keep S3 public-readable for CloudFront website hosting (HTTP-only origin)
          - Effect: Allow
            Principal: "*"
            Action: "s3:GetObject"
            Resource: !Sub "arn:aws:s3:::${FrontendBucket}/*"


  FrontendCloudFront:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - DomainName:
              !Select [2, !Split ["/", !GetAtt FrontendBucket.WebsiteURL]]
            Id: S3Origin
            CustomOriginConfig:
              OriginProtocolPolicy: http-only
        Enabled: true
        DefaultRootObject: index.html
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          ForwardedValues:
            QueryString: false

Outputs:
  WebhookApiUrl:
    Description: "API Gateway endpoint URL for the Webhook Ingestion endpoint"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/webhook"

  TrackApiUrl:
    Description: "API Gateway endpoint URL for the Track API endpoint"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/track"

  ListApiUrl:
    Description: "API Gateway endpoint URL for the List API endpoint (GET)"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/track"

  # --- FRONTEND OUTPUTS ---
  FrontendBucketName:
    Description: "Name of the S3 bucket hosting the frontend"
    Value: !Ref FrontendBucket

  CloudFrontDistributionId:
    Description: "ID of the CloudFront distribution"
    Value: !Ref FrontendCloudFront

  CloudFrontDomainName:
    Description: "Public URL of your React dashboard"
    Value: !Sub "https://${FrontendCloudFront.DomainName}"
