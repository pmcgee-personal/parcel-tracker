# template.yaml
AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  parcel-tracker

  A personal package tracking dashboard for inbound and outbound shipments.

Globals:
  Function:
    Timeout: 10 # Bumped to 10 seconds to allow network latency when saving multiple events
    Runtime: nodejs22.x

Resources:
  # DynamoDB table to store high-level shipment details.
  # PK = trackingNumber
  ShipmentsTable:
    Type: AWS::Serverless::SimpleTable
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: Shipments
      PrimaryKey:
        Name: trackingNumber
        Type: String
      ProvisionedThroughput:
        ReadCapacityUnits: 1
        WriteCapacityUnits: 1
      SSESpecification:
        SSEEnabled: true

  # DynamoDB table to store the timeline of tracking events for each shipment.
  # PK = trackingNumber, SK = occurredAt
  EventsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: Events
      AttributeDefinitions:
        - AttributeName: trackingNumber
          AttributeType: S
        - AttributeName: occurredAt
          AttributeType: S
      KeySchema:
        - AttributeName: trackingNumber
          KeyType: HASH
        - AttributeName: occurredAt
          KeyType: RANGE
      ProvisionedThroughput:
        ReadCapacityUnits: 1
        WriteCapacityUnits: 1
      SSESpecification:
        SSEEnabled: true

  # Lambda function to ingest webhook tracking updates
  WebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers/webhook/index.handler
      Environment:
        Variables:
          SHIPMENTS_TABLE: !Ref ShipmentsTable
          EVENTS_TABLE: !Ref EventsTable
      Policies:
        # Grants our Lambda permission to read/write to the Shipments DynamoDB Table
        - DynamoDBCrudPolicy:
            TableName: !Ref ShipmentsTable
        # Grants our Lambda permission to read/write to the Events DynamoDB Table
        - DynamoDBCrudPolicy:
            TableName: !Ref EventsTable
      Events:
        # Exposes this Lambda via an API Gateway endpoint: POST /webhook
        WebhookApi:
          Type: Api
          Properties:
            Path: /webhook
            Method: post

# Outputs are useful because AWS will print our brand new API Gateway URL in the CLI / Logs once deployed!
Outputs:
  WebhookApiUrl:
    Description: "API Gateway endpoint URL for the Webhook Ingestion endpoint"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/webhook"
