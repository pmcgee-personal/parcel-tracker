# template.yaml
AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  parcel-tracker

  A personal package tracking dashboard for inbound and outbound shipments.

Globals:
  Function:
    Timeout: 3
    Runtime: nodejs22.x

Resources:
  # DynamoDB table to store high-level shipment details.
  # PK = trackingNumber
  ShipmentsTable:
    Type: AWS::Serverless::SimpleTable
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: Shipments
      PrimaryKey:
        Name: trackingNumber
        Type: String
      ProvisionedThroughput:
        ReadCapacityUnits: 1
        WriteCapacityUnits: 1
      SSESpecification:
        SSEEnabled: true

  # DynamoDB table to store the timeline of tracking events for each shipment.
  # PK = trackingNumber, SK = occurredAt
  EventsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: Events
      AttributeDefinitions:
        - AttributeName: trackingNumber
          AttributeType: S
        - AttributeName: occurredAt
          AttributeType: S
      KeySchema:
        - AttributeName: trackingNumber
          KeyType: HASH
        - AttributeName: occurredAt
          KeyType: RANGE
      ProvisionedThroughput:
        ReadCapacityUnits: 1
        WriteCapacityUnits: 1
      SSESpecification:
        SSEEnabled: true
